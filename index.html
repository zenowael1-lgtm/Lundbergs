    /* ----- KEYFRAMES: STEAM, WHEAT, FLOATING, GLOW, SCROLL INDICATOR ----- */
    @keyframes floatSteam {
      0% { opacity: 0.6; transform: translateY(0) scale(1) rotate(0deg); }
      50% { opacity: 1; transform: translateY(-24px) scale(1.08) rotate(4deg); }
      100% { opacity: 0.1; transform: translateY(-48px) scale(0.85) rotate(-4deg); }
    }

    @keyframes swayWheat {
      0% { transform: rotate(-3deg) translateX(0); }
      50% { transform: rotate(6deg) translateX(8px); }
      100% { transform: rotate(-3deg) translateX(0); }
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInLeft {
      0% { opacity: 0; transform: translateX(-30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeInRight {
      0% { opacity: 0; transform: translateX(30px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(96, 114, 86, 0.3); }
      70% { box-shadow: 0 0 0 18px rgba(96, 114, 86, 0); }
      100% { box-shadow: 0 0 0 0 rgba(96, 114, 86, 0); }

    @keyframes floatY {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @keyframes grain {
      0%, 100% { transform: translate(0, 0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-3px, -1px); }
      80% { transform: translate(3px, 1px); }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }

    .fade-in { animation: fadeUp 1.2s ease forwards; }
